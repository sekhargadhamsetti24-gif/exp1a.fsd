<!DOCTYPE html>
<html>
<head>
    <title>Thumbnail Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .gallery img {
            margin: 10px;
            border: 2px solid #555;
            border-radius: 5px;
        }
        .gallery img:hover {
            border: 2px solid blue;
        }
    </style>
</head>
<body>

    <h1>Image Gallery Using Thumbnails</h1>
    <p>Click on any thumbnail to view the full-sized image.</p>

    <div class="gallery">

        <!-- Image 1 -->
        <a href="image1_large.jpg" target="_blank">
            <img src="image1_large.jpg" 
                 alt="Nature Image 1"
                 width="100" 
                 height="100">
        </a>

        <!-- Image 2 -->
        <a href="image2_large.jpg" target="_blank">
            <img src="image2_large.jpg" 
                 alt="Nature Image 2"
                 width="100" 
                 height="100">
        </a>

        <!-- Image 3 -->
        <a href="image3_large.jpg" target="_blank">
            <img src="image3_large.jpg" 
                 alt="Nature Image 3"
                 width="100" 
                 height="100">
        </a>

        <!-- Image 4 -->
        <a href="image4_large.jpg" target="_blank">
            <img src="image4_large.jpg" 
                 alt="Nature Image 4"
                 width="100" 
                 height="100">
        </a>

    </div>

</body>
</html>
